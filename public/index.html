const TrainingApp = () => {
  const [currentView, setCurrentView] = useState('home');
  const [selectedDay, setSelectedDay] = useState(null);
  const [currentWeek, setCurrentWeek] = useState(1);
  const [currentMicrocycle, setCurrentMicrocycle] = useState('microcycle1');
  const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
  const [tempWorkoutData, setTempWorkoutData] = useState({});
  const [workoutData, setWorkoutData] = useState({});
  const [exerciseReplacements, setExerciseReplacements] = useState({});
  const [showAlternatives, setShowAlternatives] = useState(null);
  const [trackingData, setTrackingData] = useState({
    sleep: {},
    motivation: {},
    fatigue: {},
    weight: {},
    soreness: {}
  });

  // Cargar datos del storage al iniciar
  useEffect(() => {
    const loadData = async () => {
      try {
        const savedWorkouts = await window.storage.get('workouts');
        const savedTracking = await window.storage.get('tracking');
        const savedWeek = await window.storage.get('currentWeek');
        const savedCycle = await window.storage.get('currentMicrocycle');
        const savedReplacements = await window.storage.get('exerciseReplacements');
        
        if (savedWorkouts) setWorkoutData(JSON.parse(savedWorkouts.value));
        if (savedTracking) setTrackingData(JSON.parse(savedTracking.value));
        if (savedWeek) setCurrentWeek(parseInt(savedWeek.value));
        if (savedCycle) setCurrentMicrocycle(savedCycle.value);
        if (savedReplacements) setExerciseReplacements(JSON.parse(savedReplacements.value));
      } catch (error) {
        console.log('Primera vez usando la app');
      }
    };
    loadData();
  }, []);

  // Guardar datos cuando cambien
  const saveWorkoutData = async (data) => {
    setWorkoutData(data);
    await window.storage.set('workouts', JSON.stringify(data));
  };

  const saveTrackingData = async (data) => {
    setTrackingData(data);
    await window.storage.set('tracking', JSON.stringify(data));
  };

  const saveWeek = async (week) => {
    setCurrentWeek(week);
    await window.storage.set('currentWeek', week.toString());
  };

  const saveCycle = async (cycle) => {
    setCurrentMicrocycle(cycle);
    await window.storage.set('currentMicrocycle', cycle);
  };

  const saveExerciseReplacement = async (day, exerciseIndex, replacement) => {
    const key = `${day}-${exerciseIndex}`;
    const updated = {
      ...exerciseReplacements,
      [key]: replacement
    };
    setExerciseReplacements(updated);
    await window.storage.set('exerciseReplacements', JSON.stringify(updated));
    setShowAlternatives(null);
  };

  const exportWorkoutData = () => {
    const exportDate = new Date().toISOString().split('T')[0];
    let report = `# REPORTE DE ENTRENAMIENTOS - JESÚS BURGA\n`;
    report += `## Exportado: ${exportDate}\n\n`;
    report += `### Configuración Actual\n`;
    report += `- **Semana**: ${currentWeek}/8\n`;
    report += `- **Microciclo**: ${ROUTINE_DATA[currentMicrocycle].name}\n\n`;
    
    report += `---\n\n`;
    
    // Reporte de entrenamientos
    report += `## REGISTRO DE ENTRENAMIENTOS\n\n`;
    
    const workoutEntries = Object.entries(workoutData).sort();
    
    if (workoutEntries.length === 0) {
      report += `*No hay entrenamientos registrados aún*\n\n`;
    } else {
      workoutEntries.forEach(([workoutKey, exercises]) => {
        const [day, date] = workoutKey.split('-').slice(0, 2);
        const fullDate = workoutKey.split('-').slice(1).join('-');
        const dayData = ROUTINE_DATA[currentMicrocycle].days[day];
        
        report += `### ${dayData.name} - ${fullDate}\n`;
        report += `**Enfoque**: ${dayData.focus}\n\n`;
        
        Object.entries(exercises).forEach(([exIdx, exData]) => {
          const originalExercise = dayData.exercises[parseInt(exIdx)];
          const replacementKey = `${day}-${exIdx}`;
          const exerciseName = exerciseReplacements[replacementKey] || originalExercise.name;
          
          report += `#### ${exerciseName}\n`;
          if (exData.sets && exData.sets.length > 0) {
            report += `| Serie | Peso (kg) | Reps |\n`;
            report += `|-------|-----------|------|\n`;
            exData.sets.forEach((set, idx) => {
              if (set.weight || set.reps) {
                report += `| ${idx + 1} | ${set.weight || '-'} | ${set.reps || '-'} |\n`;
              }
            });
          }
          if (exData.notes) {
            report += `\n**Observaciones**: ${exData.notes}\n`;
          }
          report += `\n`;
        });
        
        report += `---\n\n`;
      });
    }
    
    // Reporte de seguimiento ECN
    report += `## SEGUIMIENTO ECN\n\n`;
    
    const dates = new Set([
      ...Object.keys(trackingData.sleep),
      ...Object.keys(trackingData.motivation),
      ...Object.keys(trackingData.fatigue),
      ...Object.keys(trackingData.weight),
      ...Object.keys(trackingData.soreness)
    ]);
    
    const sortedDates = Array.from(dates).sort();
    
    if (sortedDates.length === 0) {
      report += `*No hay datos de seguimiento registrados*\n\n`;
    } else {
      report += `| Fecha | Sueño | Motivación | Fatiga | Agujetas | Peso |\n`;
      report += `|-------|-------|------------|--------|----------|------|\n`;
      
      sortedDates.forEach(date => {
        report += `| ${date} | ${trackingData.sleep[date] || '-'} | ${trackingData.motivation[date] || '-'} | ${trackingData.fatigue[date] || '-'} | ${trackingData.soreness[date] || '-'} | ${trackingData.weight[date] || '-'} |\n`;
      });
    }
    
    report += `\n---\n\n`;
    
    // Análisis de ejercicios reemplazados
    if (Object.keys(exerciseReplacements).length > 0) {
      report += `## EJERCICIOS REEMPLAZADOS\n\n`;
      Object.entries(exerciseReplacements).forEach(([key, replacement]) => {
        const [day, exIdx] = key.split('-');
        const dayData = ROUTINE_DATA[currentMicrocycle].days[day];
        const original = dayData.exercises[parseInt(exIdx)].name;
        report += `- **Día ${day}**: ${original} → ${replacement}\n`;
      });
      report += `\n`;
    }
    
    report += `---\n\n`;
    report += `*Generado por Training App Híbrida v1.0*\n`;
    
    // Crear blob y descargar
    const blob = new Blob([report], { type: 'text/markdown' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `entrenamientos-${exportDate}.md`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const WorkoutScreen = ({ day }) => {
    const dayData = ROUTINE_DATA[currentMicrocycle].days[day];
    const weekData = ROUTINE_DATA[currentMicrocycle].weeks[currentWeek - 1];
    const workoutKey = `${day}-${selectedDate}`;
    const currentWorkout = workoutData[workoutKey] || {};

    const updateExercise = (exerciseIndex, field, value) => {
      setTempWorkoutData(prev => ({
        ...prev,
        [workoutKey]: {
          ...(prev[workoutKey] || {}),
          [exerciseIndex]: {
            ...(prev[workoutKey]?.[exerciseIndex] || {}),
            [field]: value
          }
        }
      }));
    };

    const getExerciseName = (exerciseIndex) => {
      const replacementKey = `${day}-${exerciseIndex}`;
      return exerciseReplacements[replacementKey] || dayData.exercises[exerciseIndex].name;
    };

    return (
      <div className="workout-screen">
        <div className="workout-header">
          <button onClick={() => setSelectedDay(null)} className="back-btn">← Volver</button>
          <div className="workout-title">
            <h2>{dayData.name}</h2>
            <p className="focus-badge">{dayData.focus}</p>
            <p className="week-info">Semana {currentWeek} - {weekData.note}</p>
          
        <div style={{
          background: 'rgba(255, 255, 255, 0.05)',
          padding: '16px',
          borderRadius: '12px',
          marginBottom: '20px',
          border: '1px solid rgba(255, 255, 255, 0.1)'
        }}>

          max-width: 500px;
          width: 100%;
          max-height: 80vh;
          overflow-y: auto;
          box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding: 24px;
          border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-header h3 {
          font-size: 22px;
          color: #fff;
        }

        .modal-close {
          background: rgba(255, 255, 255, 0.05);
          border: 1px solid rgba(255, 255, 255, 0.1);
          color: #e8e8e8;
          width: 36px;
          height: 36px;
          border-radius: 10px;
          cursor: pointer;
          display: flex;
          align-items: center;
          justify-content: center;
          transition: all 0.2s;
        }

        .modal-close:hover {
          background: rgba(239, 68, 68, 0.2);
          border-color: #ef4444;
          color: #ef4444;
        }

        .modal-body {
          padding: 24px;
        }

        .original-exercise {
          background: rgba(255, 255, 255, 0.03);
          border: 1px solid rgba(255, 255, 255, 0.1);
          border-radius: 12px;
          padding: 16px;
          margin-bottom: 20px;
        }

        .original-exercise .label {
          color: #8b8b9f;
          font-size: 12px;
          margin-bottom: 6px;
          text-transform: uppercase;
          letter-spacing: 0.5px;
        }

        .original-exercise h4 {
          color: #fff;
          font-size: 18px;
        }

        .restore-btn {
          width: 100%;
          background: rgba(239, 68, 68, 0.15);
          border: 1px solid rgba(239, 68, 68, 0.3);
          color: #ef4444;
          padding: 12px;
          border-radius: 10px;
          cursor: pointer;
          font-size: 14px;
          font-weight: 600;
          margin-bottom: 16px;
          transition: all 0.2s;
        }

        .restore-btn:hover {
          background: rgba(239, 68, 68, 0.25);
          transform: translateX(-4px);
        }

        .alternatives-list {
          display: flex;
          flex-direction: column;
          gap: 12px;
        }

        .no-alternatives {
          color: #8b8b9f;
          text-align: center;
          padding: 32px 16px;
          font-style: italic;
        }

        .alternative-option {
          background: rgba(255, 255, 255, 0.03);
          border: 1px solid rgba(255, 255, 255, 0.1);
          border-radius: 12px;
          padding: 16px;
          cursor: pointer;
          text-align: left;
          transition: all 0.2s;
        }

        .alternative-option:hover {
          background: rgba(0, 212, 255, 0.1);
          border-color: #00d4ff;
          transform: translateX(4px);
        }

        .alternative-option.active {
          background: linear-gradient(135deg, rgba(0, 212, 255, 0.2) 0%, rgba(147, 51, 234, 0.2) 100%);
          border-color: #00d4ff;
        }

        .alt-name {
          color: #fff;
          font-weight: 700;
          font-size: 16px;
          margin-bottom: 6px;
        }

        .alt-notes {
          color: #8b8b9f;
          font-size: 13px;
          line-height: 1.4;
        }

        .exercise-header {
          margin-bottom: 16px;
        }

        .priority-tag {
          background: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 100%);
          color: white;
          padding: 4px 10px;
          border-radius: 8px;
          font-size: 11px;
          font-weight: 700;
          margin-left: 8px;
          text-transform: uppercase;
        }

        .exercise-meta {
          color: #8b8b9f;
          font-size: 13px;
          margin-bottom: 6px;
        }

        .exercise-notes {
          color: #9333ea;
          font-size: 13px;
          font-style: italic;
        }

        /* Sets Grid */
        .sets-grid {
          display: flex;
          flex-direction: column;
          gap: 10px;
          margin-bottom: 12px;
        }

        .set-row {
          display: flex;
          align-items: center;
          gap: 12px;
          background: rgba(0, 0, 0, 0.2);
          padding: 12px;
          border-radius: 10px;
        }

        .set-number {
          font-weight: 700;
          color: #00d4ff;
          min-width: 32px;
          font-size: 14px;
        }

        .weight-input, .reps-input {
          background: rgba(255, 255, 255, 0.05);
          border: 1px solid rgba(255, 255, 255, 0.1);
          color: #e8e8e8;
          padding: 10px 12px;
          border-radius: 8px;
          font-size: 16px;
          font-weight: 600;
          width: 80px;
          text-align: center;
        }

        .weight-input:focus, .reps-input:focus {
          outline: none;
          border-color: #00d4ff;
          background: rgba(0, 212, 255, 0.1);
        }

        .separator {
          color: #8b8b9f;
          font-weight: 600;
        }

        .exercise-notes-input {
          width: 100%;
          background: rgba(0, 0, 0, 0.2);
          border: 1px solid rgba(255, 255, 255, 0.1);
          color: #e8e8e8;
          padding: 12px;
          border-radius: 10px;
          font-size: 14px;
          font-family: inherit;
          resize: vertical;
          min-height: 60px;
        }

        .exercise-notes-input:focus {
          outline: none;
          border-color: #9333ea;
          background: rgba(147, 51, 234, 0.1);
        }

        /* Cardio Section */
        .cardio-section {
          background: linear-gradient(135deg, rgba(236, 72, 153, 0.15) 0%, rgba(239, 68, 68, 0.15) 100%);
          border: 1px solid rgba(236, 72, 153, 0.3);
          border-radius: 16px;
          padding: 20px;
          margin-top: 32px;
        }

        .cardio-section h3 {
          color: #fff;
          margin-bottom: 12px;
          font-size: 18px;
        }

        .cardio-section p, .cardio-section li {
          color: #e8e8e8;
          font-size: 14px;
          line-height: 1.6;
        }

        .cardio-section ul {
          margin-top: 8px;
          padding-left: 20px;
        }

        /* Tracking Screen */
        .tracking-screen {
          padding: 20px;
          max-width: 1000px;
          margin: 0 auto;
        }

        .tracking-screen h2 {
          font-size: 32px;
          margin-bottom: 8px;
          color: #fff;
          text-align: center;
        }

        .tracking-subtitle {
          text-align: center;
          color: #8b8b9f;
          margin-bottom: 32px;
          font-size: 16px;
        }

        .tracking-cards {
          display: grid;
          gap: 20px;
          margin-bottom: 32px;
        }

        .tracking-card {
          background: rgba(255, 255, 255, 0.03);
          border: 1px solid rgba(255, 255, 255, 0.1);
          border-radius: 16px;
          padding: 24px;
        }

        .tracking-card h3 {
          font-size: 18px;
          margin-bottom: 16px;
          color: #fff;
        }

        .rating-buttons {
          display: flex;
          flex-wrap: wrap;
          gap: 10px;
        }

        .rating-btn {
          background: rgba(255, 255, 255, 0.05);
          border: 1px solid rgba(255, 255, 255, 0.1);
          color: #e8e8e8;
          padding: 10px 16px;
          border-radius: 10px;
          cursor: pointer;
          font-size: 13px;
          font-weight: 600;
          transition: all 0.2s;
          flex: 1;
          min-width: 100px;
        }

        .rating-btn:hover {
          background: rgba(0, 212, 255, 0.2);
          border-color: #00d4ff;
          transform: translateY(-2px);
        }

        .rating-btn.active {
          background: linear-gradient(135deg, #00d4ff 0%, #9333ea 100%);
          border-color: transparent;
          color: white;
        }

        .weight-tracking-input {
          width: 100%;
          background: rgba(255, 255, 255, 0.05);
          border: 1px solid rgba(255, 255, 255, 0.1);
          color: #e8e8e8;
          padding: 14px;
          border-radius: 10px;
          font-size: 18px;
          font-weight: 600;
          text-align: center;
        }

        .weight-tracking-input:focus {
          outline: none;
          border-color: #00d4ff;
          background: rgba(0, 212, 255, 0.1);
        }

        /* Tracking Summary */
        .tracking-summary {
          background: linear-gradient(135deg, rgba(0, 212, 255, 0.15) 0%, rgba(147, 51, 234, 0.15) 100%);
          border: 1px solid rgba(0, 212, 255, 0.3);
          border-radius: 16px;
          padding: 24px;
        }

        .tracking-summary h3 {
          color: #fff;
          margin-bottom: 16px;
          font-size: 18px;
        }

        .summary-stats {
          display: grid;
          gap: 12px;
        }

        .stat-item {
          display: flex;
          justify-content: space-between;
          padding: 12px;
          background: rgba(0, 0, 0, 0.2);
          border-radius: 10px;
        }

        .stat-label {
          color: #8b8b9f;
          font-size: 14px;
        }

        .stat-value {
          color: #00d4ff;
          font-weight: 700;
          font-size: 14px;
        }

        /* Responsive */
        @media (max-width: 768px) {
          .hero-section h1 {
            font-size: 32px;
          }

          .days-grid {
            grid-template-columns: 1fr;
          }

          .info-cards {
            grid-template-columns: 1fr;
          }

          .week-selector {
            flex-direction: column;
          }

          .rating-buttons {
            flex-direction: column;
          }

          .rating-btn {
            min-width: 100%;
          }
        }
      `}</style>

      {selectedDay ? (
        WorkoutScreen({ day: selectedDay })
      ) : currentView === 'tracking' ? (
        TrackingScreen()
      ) : (
        HomeScreen()
      )}

      <nav className="bottom-nav">
        <button 
          className={`nav-btn ${currentView === 'home' && !selectedDay ? 'active' : ''}`}
          onClick={() => { setCurrentView('home'); setSelectedDay(null); }}
        >
          <Home size={24} />
          <span>Inicio</span>
        </button>
        <button 
          className={`nav-btn ${currentView === 'tracking' ? 'active' : ''}`}
          onClick={() => { setCurrentView('tracking'); setSelectedDay(null); }}
        >
          <BarChart3 size={24} />
          <span>Seguimiento</span>
        </button>
        <button 
          className="nav-btn"
          onClick={() => {
            if (currentWeek === 8) {
              saveWeek(1);
              saveCycle(currentMicrocycle === 'microcycle1' ? 'microcycle2' : 'microcycle1');
            }
          }}
        >
          <Settings size={24} />
          <span>Config</span>
        </button>
      </nav>

      {AlternativesModal()}
    </div>
  );
};


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<TrainingApp />);
  </script>
</body>
</html>
